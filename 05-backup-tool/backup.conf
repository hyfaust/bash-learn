# ============================================================================
# backup.conf — 备份工具配置文件示例
# ============================================================================

# 源目录列表（空格分隔）
SOURCE_DIRS="/home/user/documents /home/user/projects"

# 目标目录
DEST_DIR="/tmp/backup"

# 压缩方式: gzip, bzip2, xz, none
COMPRESS_TYPE="gzip"

# 保留最近 N 份备份
KEEP_COUNT=7

# 备份模式: full, incr
BACKUP_MODE="incr"

# 日志文件
LOG_FILE="/tmp/backup/backup.log"

# 排除模式（每行一个）
EXCLUDES=(
    "*.tmp"
    "*.swp"
    ".git"
    "node_modules"
    "__pycache__"
)
